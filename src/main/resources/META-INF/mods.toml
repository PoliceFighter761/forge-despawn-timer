[[mods]]
modId="despawntimer"
version="${file.jarVersion}"
displayName="Despawn Timer"
authors="DespawnTimer"
description='''
Extends the despawn timer for items dropped on player death.
Manual drops, breaking blocks, mob loot, etc. are unaffected.

Default: 60 minutes (configurable 5-1440 via /despawntimer command).
'''

